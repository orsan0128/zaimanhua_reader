apply plugin: 'com.android.application'

android {
    compileSdk 34
    namespace 'com.zaimanhua.reader'

    defaultConfig {
        applicationId "com.zaimanhua.reader"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
